# Full configuration for TRAINING (kbqa --config configs/train.yaml ...)
# Loaded into kbqa.config.AppConfig. Paths come from env vars (KBQA_*), never hard-coded.
project_title: "Knowledge Base Question-Answering System"
author: "Le Dinh Minh Quan"

data:
  reader_dataset: "rajpurkar/squad_v2"
  reader_config: "squad_v2"
  multihop_dataset: "hotpotqa/hotpot_qa"
  retriever_pairs_dataset: "sentence-transformers/natural-questions"
  retriever_pairs_config: "pair"
  demo_kb_dataset: "rag-datasets/rag-mini-wikipedia"
  demo_kb_corpus_config: "text-corpus"
  demo_kb_qa_config: "question-answer"
  recall_dataset: "rag-datasets/rag-mini-bioasq"
  generative_rag_dataset: "neural-bridge/rag-dataset-12000"
  seed: 42

chunk:
  chunk_size_words: 256
  overlap_words: 48
  min_words: 24

retriever:
  bi_encoder_model: "BAAI/bge-base-en-v1.5"
  bi_encoder_fallback: "sentence-transformers/all-MiniLM-L6-v2"
  query_instruction: "Represent this sentence for searching relevant passages: "
  e5_style: false
  embed_batch_size: 64
  top_k: 20
  use_bm25: true
  rrf_k: 60
  train_batch_size: 64
  num_train_epochs: 3
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  num_hard_negatives: 8

reranker:
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  cross_encoder_gpu: "BAAI/bge-reranker-v2-m3"
  rerank_top_n: 5
  use_gpu_reranker: false
  max_length: 512

reader:
  model_name: "deepset/roberta-base-squad2"
  model_gpu: "deepset/deberta-v3-large-squad2"
  max_length: 384
  doc_stride: 128
  null_score_threshold: 0.0
  max_answer_length: 64
  num_train_epochs: 2
  learning_rate: 3.0e-5
  per_device_train_batch_size: 16
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  fp16: false
  early_stopping_patience: 3
  seed: 42

generator:
  model_name: "google/flan-t5-base"
  model_large: "google/flan-t5-large"
  max_input_length: 1024
  max_target_length: 128
  num_train_epochs: 3
  learning_rate: 1.0e-4
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 2
  label_smoothing_factor: 0.1
  bf16: true            # FLAN-T5 NaNs under fp16 — never use fp16

agent:
  reader_mode: "extractive"   # "extractive" | "generative"
  max_iterations: 3
  tau_high: 0.55
  tau_low: 0.15
  faithfulness_threshold: 0.30
  require_citations: true
  orchestrator: "rule"        # "rule" (no API) | "llm"
  llm_model: "claude-haiku-4-5-20251001"
  llm_api_key_env: "KBQA_LLM_API_KEY"

serving:
  model_version: "v1"
  api_version: "1.0.0"
  log_queries: true
  max_batch_questions: 64
