# Inference / serving configuration (kbqa serve --config configs/infer.yaml)
project_title: "Knowledge Base Question-Answering System"
author: "Le Dinh Minh Quan"

chunk:
  chunk_size_words: 256
  overlap_words: 48

retriever:
  bi_encoder_model: "BAAI/bge-base-en-v1.5"
  bi_encoder_fallback: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 20
  use_bm25: true

reranker:
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  rerank_top_n: 5
  use_gpu_reranker: false

reader:
  model_name: "deepset/roberta-base-squad2"
  null_score_threshold: 0.0

agent:
  reader_mode: "extractive"
  max_iterations: 3
  tau_high: 0.55
  tau_low: 0.15
  faithfulness_threshold: 0.30
  require_citations: true
  orchestrator: "rule"        # set "llm" + export KBQA_LLM_API_KEY to enable the LLM brain

serving:
  model_version: "v1"
  api_version: "1.0.0"
  log_queries: true
